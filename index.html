<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فاحص الروابط</title>
  <style>
    :root {
      --bg-dark: #0d1117;
      --bg-light: #f5f7fa;
      --text-dark: #eaeaea;
      --text-light: #222;
    }

    body {
      margin: 0;
      font-family: "Tajawal", sans-serif;
      background: var(--bg-dark);
      color: var(--text-dark);
      transition: background 0.5s, color 0.5s;
    }

    body.light { background: var(--bg-light); color: var(--text-light); }

    header { text-align: center; padding: 2rem 1rem; }
    h1 { font-size: 2rem; }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 1rem;
      text-align: center;
    }

    input[type="url"] {
      width: 80%;
      padding: 0.7rem;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    select {
      padding: 0.5rem;
      margin-bottom: 2rem;
      border-radius: 10px;
      font-size: 1rem;
    }

    .service { margin-bottom: 2rem; perspective: 1000px; }

    .logo {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      display: inline-block;
      animation: spin 12s linear infinite;
      transform-style: preserve-3d;
    }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }

    button {
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: white;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    button:hover { transform: scale(1.08) rotate3d(1,1,0,10deg); }

    /* ألوان الأزرار */
    .urlquery { background: #4f46e5; }
    .urlquery:hover { box-shadow: 0 0 20px #4f46e5, 0 0 40px #6366f1; }
    .hathr { background: #16a34a; }
    .hathr:hover { box-shadow: 0 0 20px #16a34a, 0 0 40px #22c55e; }
    .urlvoid { background: #0284c7; }
    .urlvoid:hover { box-shadow: 0 0 20px #0284c7, 0 0 40px #38bdf8; }
    .virustotal { background: #1d4ed8; }
    .virustotal:hover { box-shadow: 0 0 20px #1d4ed8, 0 0 40px #3b82f6; }

    .desc { margin-top: 0.6rem; font-size: 0.9rem; opacity: 0.85; }

    .theme-toggle {
      margin-top: 2rem;
      padding: 0.7rem 1.5rem;
      background: #666;
      border-radius: 10px;
      color: white;
    }

    /* نافذة منبثقة */
    .popup, .internal-view {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      flex-direction: column;
    }

    .popup-content, .internal-content {
      width: 90%;
      height: 80%;
      border-radius: 15px;
      overflow: hidden;
      transform: scale3d(0.7,0.7,0.7) rotateX(20deg);
      opacity: 0;
      transition: all 0.5s ease;
      background: white;
      position: relative;
    }

    .popup.show .popup-content,
    .internal-view.show .internal-content {
      transform: scale3d(1,1,1) rotateX(0deg);
      opacity: 1;
    }

    iframe {
      width: 100%; height: 100%; border: none;
    }

    .close-btn, .back-btn {
      position: absolute;
      top: 10px; left: 10px;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 10px;
      background: crimson;
      color: white;
      cursor: pointer;
      z-index: 10000;
    }

    /* شاشة التحميل */
    .loading {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 1.2rem;
      z-index: 10001;
    }

    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spinLoader 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spinLoader { 100% { transform: rotate(360deg); } }

    /* خلفية الأيقونات */
    .bg-icons {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .bg-icons span {
      position: absolute;
      font-size: 2.5rem;
      opacity: 0.15;
      animation: float 20s linear infinite;
      will-change: transform;
    }
    @keyframes float {
      from { transform: translateY(100vh) rotate(0deg); }
      to { transform: translateY(-120vh) rotate(360deg); }
    }
  </style>
</head>
<body>
  <header>
    <h1>🔎 فاحص الروابط</h1>
    <p>أدخل الرابط وحدد طريقة العرض:</p>
  </header>

  <div class="container">
    <input type="url" id="urlInput" placeholder="https://example.com">
    <br>
    <select id="viewMode">
      <option value="internal">عرض داخل الموقع</option>
      <option value="popup">عرض منبثق</option>
      <option value="newtab">فتح في نافذة جديدة</option>
    </select>

    <!-- الخدمات -->
    <div class="service">
      <div class="logo">🔍</div><br>
      <button class="urlquery" onclick="checkURL('urlquery')">تحليل كامل (URLQuery)</button>
      <div class="desc">تحليل شامل لسلوك الرابط والاتصالات.</div>
    </div>

    <div class="service">
      <div class="logo">🛰️</div><br>
      <button class="hathr" onclick="checkURL('hathr')">فحص وابلاغ (HATHR)</button>
      <div class="desc">منصة محلية للفحص والإبلاغ عن الروابط.</div>
    </div>

    <div class="service">
      <div class="logo">🌐</div><br>
      <button class="urlvoid" onclick="checkURL('urlvoid')">فحص السمعة (URLVoid)</button>
      <div class="desc">التحقق من سمعة النطاق عبر قواعد البيانات.</div>
    </div>

    <div class="service">
      <div class="logo">🛡️</div><br>
      <button class="virustotal" onclick="checkURL('virustotal')">فحص بالذكاء الاصطناعي (VirusTotal)</button>
      <div class="desc">فحص عبر محركات الحماية والذكاء الاصطناعي.</div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">🌗 تبديل الثيم</button>
  </div>

  <!-- خلفية -->
  <div class="bg-icons" id="bgIcons"></div>

  <!-- نافذة منبثقة -->
  <div class="popup" id="popup">
    <div class="popup-content">
      <button class="close-btn" onclick="closePopup()">❌ إغلاق</button>
      <div class="loading" id="popupLoading">
        <div class="loader"></div>
        <p id="popupMsg">جاري الفحص...</p>
      </div>
      <iframe id="popupFrame"></iframe>
    </div>
  </div>

  <!-- عرض داخلي -->
  <div class="internal-view" id="internal">
    <div class="internal-content">
      <button class="back-btn" onclick="closeInternal()">🔙 رجوع</button>
      <div class="loading" id="internalLoading">
        <div class="loader"></div>
        <p id="internalMsg">جاري الفحص...</p>
      </div>
      <iframe id="internalFrame"></iframe>
    </div>
  </div>

  <!-- صوت -->
  <audio id="clickSound" preload="auto">
    <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
  </audio>

  <script>
    const messages = {
      urlquery: "🔍 جاري فحص الرابط عبر URLQuery...",
      hathr: "🛰️ جاري فحص الرابط عبر HATHR...",
      urlvoid: "🌐 جاري فحص الرابط عبر URLVoid...",
      virustotal: "🛡️ جاري فحص الرابط عبر VirusTotal..."
    };
    const colors = {
      urlquery: "#4f46e5",
      hathr: "#16a34a",
      urlvoid: "#0284c7",
      virustotal: "#1d4ed8"
    };

    function checkURL(service) {
      const url = document.getElementById("urlInput").value.trim();
      const mode = document.getElementById("viewMode").value;
      if (!url) return alert("أدخل رابط أولاً");
      document.getElementById("clickSound").play();

      let encoded = encodeURIComponent(url);
      let link = "";
      try {
        let domain = new URL(url).hostname;
        switch(service) {
          case "urlquery": link = `https://urlquery.net/search?q=${encoded}`; break;
          case "hathr": link = `https://hathr.sa/url/?url=${encoded}`; break;
          case "urlvoid": link = `https://www.urlvoid.com/scan/${domain}`; break;
          case "virustotal": link = `https://www.virustotal.com/gui/url/${btoa(url)}`; break;
        }
      } catch(e) { return alert("الرابط غير صالح"); }

      if (mode === "newtab") {
        window.open(link, "_blank");
      } else if (mode === "popup") {
        showPopup(link, service);
      } else {
        showInternal(link, service);
      }
    }

    // popup
    function showPopup(link, service) {
      const popup = document.getElementById("popup");
      const frame = document.getElementById("popupFrame");
      const msg = document.getElementById("popupMsg");
      const loading = document.getElementById("popupLoading");
      popup.style.display = "flex";
      setTimeout(()=>popup.classList.add("show"), 10);
      msg.textContent = messages[service];
      loading.style.display = "flex";
      frame.style.background = colors[service];
      frame.src = link;
      frame.onload = ()=> loading.style.display="none";
    }
    function closePopup() {
      const popup = document.getElementById("popup");
      popup.classList.remove("show");
      setTimeout(()=>popup.style.display="none",500);
    }

    // internal
    function showInternal(link, service) {
      const internal = document.getElementById("internal");
      const frame = document.getElementById("internalFrame");
      const msg = document.getElementById("internalMsg");
      const loading = document.getElementById("internalLoading");
      internal.style.display = "flex";
      setTimeout(()=>internal.classList.add("show"), 10);
      msg.textContent = messages[service];
      loading.style.display = "flex";
      frame.style.background = colors[service];
      frame.src = link;
      frame.onload = ()=> loading.style.display="none";
    }
    function closeInternal() {
      const internal = document.getElementById("internal");
      internal.classList.remove("show");
      setTimeout(()=>internal.style.display="none",500);
    }

    function toggleTheme() { document.body.classList.toggle("light"); }

    // أيقونات خلفية
    const icons = ["🔒","🔑","🦠","🛡️"];
    const bg = document.getElementById("bgIcons");
    for (let i=0;i<20;i++){
      let span=document.createElement("span");
      span.innerText=icons[Math.floor(Math.random()*icons.length)];
      span.style.left=Math.random()*100+"vw";
      span.style.animationDuration=10+Math.random()*20+"s";
      span.style.fontSize=1+Math.random()*2.5+"rem";
      bg.appendChild(span);
    }
  </script>
</body>
</html>
